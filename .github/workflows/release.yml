# .github/workflows/release.yml
#
# Triggered when you push a version tag (e.g. v0.1.0).
# Runs tests, builds the Python package, and publishes to PyPI.
#
# Required GitHub secrets (set in repo Settings → Secrets → Actions):
#   PYPI_API_TOKEN   — from pypi.org → Account Settings → API tokens

name: Release

on:
  push:
    tags:
      - "v*.*.*"   # triggers on v0.1.0, v1.2.3, etc.

permissions:
  contents: write   # needed to create a GitHub Release

jobs:
  # ── 1. Test ───────────────────────────────────────────────────────────
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install --upgrade setuptools
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest --tb=short -q

  # ── 2. Build ──────────────────────────────────────────────────────────
  build:
    name: Build package
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build tools
        run: pip install build

      - name: Build sdist + wheel
        run: python -m build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # ── 3. GitHub Release ─────────────────────────────────────────────────
  github-release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true   # auto-generates changelog from commits

  # ── 4. Publish to PyPI ────────────────────────────────────────────────
  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi   # optional: add a manual approval gate in repo settings

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}